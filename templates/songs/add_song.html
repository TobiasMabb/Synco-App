<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Song | SYNCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tugma sa scrollbar style ng main page */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        
        /* Pinipigilan ang iOS/Android auto-zoom kapag nag-tatap sa inputs */
        @media screen and (max-width: 767px) {
            input, textarea { font-size: 16px !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-3 sm:p-6 md:p-10 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-2xl bg-zinc-900 border border-zinc-800 p-5 sm:p-6 md:p-8 rounded-2xl shadow-2xl">
        <h2 class="text-xl sm:text-2xl font-black text-white mb-6 tracking-tight">Add New Song</h2>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Title</label>
                    <input type="text" id="title" name="title" required 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Artist</label>
                    <input type="text" id="artist" name="artist" required 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>
            </div>

            <button type="button" id="btn-fetch" onclick="autoFetch()" 
                    class="w-full bg-emerald-950 border border-emerald-800 text-emerald-400 py-3.5 rounded-xl font-black text-xs uppercase tracking-widest hover:border-emerald-500 hover:text-white active:scale-[0.99] transition shadow-lg shadow-emerald-950/20">
                ⚡ Auto-Fetch Lyrics & Video
            </button>

            <div>
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">YouTube Video ID</label>
                <input type="text" id="youtube_id" name="youtube_id" readonly 
                       class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-sm text-zinc-500 cursor-not-allowed outline-none" 
                       placeholder="Kusang papasok ang ID dito...">
            </div>

            <div>
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Lyrics</label>
                <textarea id="lyrics" name="lyrics" rows="5" 
                          class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-sm focus:border-emerald-500 outline-none transition"></textarea>
            </div>

            <div>
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1.5">Chords (Manual Paste)</label>
                <textarea id="chords" name="chords" rows="5" 
                          class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3.5 text-sm font-mono focus:border-emerald-500 outline-none transition" 
                          placeholder="Paste chords here..."></textarea>
            </div>

            <div class="flex flex-col-reverse sm:flex-row gap-3 pt-2">
                <a href="{% url 'song_list' %}" 
                   class="w-full sm:w-1/2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-3.5 rounded-xl font-bold text-sm text-center transition">
                    Cancel
                </a>
                <button type="submit" 
                        class="w-full sm:w-1/2 bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl font-bold text-sm transition shadow-lg shadow-emerald-900/10">
                    Save Song
                </button>
            </div>
        </form>
    </div>

    <script>
        function autoFetch() {
            let title = document.getElementById('title').value.trim();
            let artist = document.getElementById('artist').value.trim();
            let btn = document.getElementById('btn-fetch');

            if (!title || !artist) { alert('Please enter both Title and Artist first!'); return; }

            btn.innerText = "🔄 Fetching...";
            btn.disabled = true;

            fetch(`/songs/get-lyrics/?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.lyrics) document.getElementById('lyrics').value = data.lyrics;
                    if (data.youtube_id) {
                        document.getElementById('youtube_id').value = data.youtube_id;
                        btn.innerText = "✨ Fetch Successful!";
                    } else {
                        btn.innerText = "⚠️ Video not found.";
                    }
                    btn.disabled = false;
                })
                .catch(err => {
                    btn.innerText = "❌ Fetch Failed";
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
