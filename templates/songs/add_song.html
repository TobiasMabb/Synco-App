<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Add New Song | SYNCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tugma sa scrollbar style ng main page */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-zinc-900 border border-zinc-800 p-5 sm:p-8 rounded-xl sm:rounded-2xl shadow-2xl">
        <h2 class="text-xl sm:text-2xl font-black text-white mb-6 tracking-tight">Add New Song</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Title</label>
                    <input type="text" id="title" name="title" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Artist</label>
                    <input type="text" id="artist" name="artist" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                </div>
            </div>

            <button type="button" id="btn-fetch" onclick="autoFetch()" class="w-full bg-emerald-950 border border-emerald-800 text-emerald-400 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:border-emerald-500 hover:text-white transition mb-6 shadow-lg shadow-emerald-950/20 active:scale-[0.98] flex items-center justify-center gap-2">
                <span id="btn-icon">⚡</span>
                <span id="btn-text">Auto-Fetch Lyrics, Video & Chords</span>
            </button>

            <div class="mb-4">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">YouTube Video ID</label>
                <input type="text" id="youtube_id" name="youtube_id" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm outline-none focus:border-emerald-500 transition duration-300" placeholder="Here's the Youtube ID...">
            </div>

            <div class="mb-4">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Lyrics</label>
                <textarea id="lyrics" name="lyrics" rows="6" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm focus:border-emerald-500 outline-none transition duration-300" placeholder="Lyrics will automatically appear here..."></textarea>
            </div>

            <div class="mb-8">
                <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Chords (Auto-filled / Manual Paste)</label>
                <textarea id="chords" name="chords" rows="6" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-sm font-mono focus:border-emerald-500 outline-none transition duration-300" placeholder="Chords will automatically appear here..."></textarea>
            </div>

            <div class="flex flex-col-reverse sm:flex-row gap-3 sm:gap-4">
                <a href="{% url 'song_list' %}" class="w-full sm:w-1/2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 py-3 rounded-xl font-bold text-sm text-center transition">Cancel</a>
                <button type="submit" class="w-full sm:w-1/2 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold text-sm transition">Save Song</button>
            </div>
        </form>
    </div>

    <script>
        function autoFetch() {
            let title = document.getElementById('title').value.trim();
            let artist = document.getElementById('artist').value.trim();
            
            let btn = document.getElementById('btn-fetch');
            let btnIcon = document.getElementById('btn-icon');
            let btnText = document.getElementById('btn-text');
            
            let youtubeField = document.getElementById('youtube_id');
            let lyricsField = document.getElementById('lyrics');
            let chordsField = document.getElementById('chords');

            if (!title || !artist) { 
                alert('Please enter both Title and Artist first!'); 
                return; 
            }

            // 1. Simulan ang Animation sa Button (Spinning SVG)
            btn.disabled = true;
            btnText.innerText = "Syncing with cloud databases...";
            btnIcon.innerHTML = `
                <svg class="animate-spin h-4 w-4 text-emerald-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;

            // 2. Simulan ang Skeleton Pulse Animation sa mga Empty Fields
            const targetFields = [youtubeField, lyricsField, chordsField];
            targetFields.forEach(field => {
                field.classList.add('animate-pulse', 'border-emerald-500/30', 'bg-zinc-900/50');
                field.placeholder = "Gathering data, please wait...";
            });

            // Sabay na requests sa dalawang backend views
            const fetchLyrics = fetch(`/songs/get-lyrics/?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`).then(res => res.json());
            const fetchChordsAndVideo = fetch(`/songs/api/fetch-chords/?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`).then(res => res.json());

            Promise.all([fetchLyrics, fetchChordsAndVideo])
                .then(([lyricsData, chordsVideoData]) => {
                    
                    // Alisin ang pulse animations dahil nandito na ang data
                    targetFields.forEach(field => field.classList.remove('animate-pulse', 'border-emerald-500/30', 'bg-zinc-900/50'));

                    // 1. Ipasok ang Lyrics kung meron
                    if (lyricsData.lyrics) {
                        lyricsField.value = lyricsData.lyrics;
                    } else {
                        lyricsField.placeholder = "Lyrics not found.";
                    }

                    // 2. Ipasok ang Chords
                    if (chordsVideoData.chords) {
                        chordsField.value = chordsVideoData.chords;
                    } else {
                        chordsField.placeholder = "Chords not found.";
                    }

                    // 3. Ipasok ang YouTube Video ID at i-update ang Button UI base sa kinalabasan
                    if (chordsVideoData.youtube_id) {
                        youtubeField.value = chordsVideoData.youtube_id;
                        btnIcon.innerHTML = "✨";
                        btnText.innerText = "Fetch Successful!";
                        btn.className = btn.className.replace('text-emerald-400 border-emerald-800 bg-emerald-950', 'text-white border-emerald-500 bg-emerald-600');
                    } else {
                        youtubeField.value = "";
                        youtubeField.placeholder = "Video not found. Please paste ID manually.";
                        btnIcon.innerHTML = "⚠️";
                        btnText.innerText = "Chords/Lyrics OK, Video Not Found";
                    }

                    // Ibalik sa normal ang status ng button pagkatapos ng konting delay
                    setTimeout(() => {
                        btnIcon.innerHTML = "⚡";
                        btnText.innerText = "Auto-Fetch Lyrics, Video & Chords";
                        btn.disabled = false;
                        // Ibalik ang orihinal na kulay ng button kung nagbago ito
                        btn.className = "w-full bg-emerald-950 border border-emerald-800 text-emerald-400 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:border-emerald-500 hover:text-white transition mb-6 shadow-lg shadow-emerald-950/20 active:scale-[0.98] flex items-center justify-center gap-2";
                    }, 3000);

                })
                .catch(err => {
                    console.error("Fetch error:", err);
                    targetFields.forEach(field => {
                        field.classList.remove('animate-pulse', 'border-emerald-500/30', 'bg-zinc-900/50');
                        field.placeholder = "Fetch failed.";
                    });
                    btnIcon.innerHTML = "❌";
                    btnText.innerText = "Fetch Failed";
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
