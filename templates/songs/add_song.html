{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Song | SYNCO</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #1DB954;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background:
                radial-gradient(circle at top, rgba(29,185,84,0.12), transparent 40%),
                radial-gradient(circle at bottom, rgba(29,185,84,0.06), transparent 45%),
                #000;
        }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .btn-green {
            background: var(--green);
            color: black;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .btn-green:hover {
            transform: scale(1.03);
        }

        input, textarea {
            outline: none;
        }
    </style>
</head>

<body class="text-white min-h-screen px-4 py-10">

<!-- HEADER -->
<div class="max-w-3xl mx-auto mb-6">
    <h1 class="text-2xl font-bold">
        Add <span style="color: var(--green)">New Song</span>
    </h1>
    <p class="text-white/60 text-sm">
        Create and auto-generate song data
    </p>
</div>

<!-- CARD -->
<div class="max-w-3xl mx-auto glass rounded-2xl p-6 md:p-8">

    <form method="POST">
        {% csrf_token %}

        <!-- TITLE -->
        <div>
            <label class="text-xs text-white/60">Title</label>
            <input name="title" id="title" required
                placeholder="e.g. What a Beautiful Name, Oceans, Cornerstone"
                class="w-full mt-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:border-green-500">
        </div>

        <!-- ARTIST -->
        <div>
            <label class="text-xs text-white/60">Artist</label>
            <input name="artist" id="artist" required
                placeholder="e.g. Hillsong Worship, Bethel Music, Elevation Worship"
                class="w-full mt-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:border-green-500">
        </div>

        <!-- AUTO FETCH -->
        <button type="button" id="btn-fetch" onclick="autoFetch()"
                class="w-full mt-5 text-xs mb-5 py-4 text-sm rounded-xl btn-green">
            Auto-Fetch
        </button>

        <!-- YOUTUBE -->
        <div class="mb-4">
            <label class="text-xs text-white/60">YouTube ID</label>
            <input name="youtube_id" id="youtube_id"
                   class="w-full mt-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:border-green-500">
        </div>

        <!-- LYRICS -->
        <div class="mb-4">
            <label class="text-xs text-white/60">Lyrics</label>
            <textarea name="lyrics" id="lyrics" rows="6"
                      class="w-full mt-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:border-green-500"></textarea>
        </div>

        <!-- CHORDS -->
        <div class="mb-6">
            <label class="text-xs text-white/60">Chords</label>
            <textarea name="chords" id="chords" rows="6"
                      class="w-full mt-1 p-3 rounded-xl bg-black/40 border border-white/10 focus:border-green-500 font-mono"></textarea>
        </div>

        <!-- BUTTONS -->
        <div class="flex gap-3">
            <a href="{% url 'song_list' %}"
               class="w-1/2 text-center py-3 rounded-xl bg-white/10 hover:bg-white/20">
                Cancel
            </a>

            <button class="w-1/2 py-3 rounded-xl btn-green">
                Save Song
            </button>
        </div>

    </form>
</div>

<!-- SCRIPT -->
<script>
function autoFetch() {
    let title = document.getElementById('title')?.value;
    let artist = document.getElementById('artist')?.value;

    if (!title || !artist) {
        alert("Enter title and artist first");
        return;
    }

    const btn = document.getElementById("btn-fetch");
    btn.innerText = "Fetching...";
    btn.disabled = true;

    Promise.all([
        fetch(`/songs/get-lyrics/?title=${title}&artist=${artist}`).then(r => r.json()),
        fetch(`/songs/api/fetch-chords/?title=${title}&artist=${artist}`).then(r => r.json())
    ])
    .then(([lyrics, chords]) => {

        if (lyrics.lyrics) {
            document.getElementById("lyrics").value = lyrics.lyrics;
        }

        if (chords.chords) {
            document.getElementById("chords").value = chords.chords;
        }

        if (chords.youtube_id) {
            document.getElementById("youtube_id").value = chords.youtube_id;
        }

        btn.innerText = "Done ✓";
        btn.disabled = false;
    })
    .catch(() => {
        btn.innerText = "Failed";
        btn.disabled = false;
    });
}
</script>

</body>
</html>
