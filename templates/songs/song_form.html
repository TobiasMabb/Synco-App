{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-zinc-900 border border-zinc-800 rounded-xl p-6 shadow-xl mt-10">
    <div class="mb-6">
        <h2 class="text-xl font-bold text-white tracking-tight">✨ Synco Magic Add</h2>
        <p class="text-xs text-zinc-400 mt-1">Type the title and let the system fetch chords, lyrics, BPM, and Key automatically.</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <!-- Title Input -->
        <div class="flex flex-col space-y-1">
            <label class="text-xs font-medium text-zinc-400">Song Title *</label>
            <input type="text" name="title" required placeholder="e.g., Way Maker" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-brandBlue transition">
        </div>

        <!-- Artist Input -->
        <div class="flex flex-col space-y-1">
            <label class="text-xs font-medium text-zinc-400">Artist / Band (Optional but helps accuracy)</label>
            <input type="text" name="artist" placeholder="e.g., Sinach or Leeland" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-brandBlue transition">
        </div>

        <!-- Submit Action -->
        <div class="pt-4">
            <button type="submit" class="w-full py-2.5 px-4 bg-brandBlue bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition shadow-lg shadow-blue-500/10 flex items-center justify-center gap-2">
                🚀 Fetch & Automate Song
            </button>
        </div>
    </form>
</div>
{% endblock %}
