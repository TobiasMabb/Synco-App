{% extends 'base.html' %}
{% block content %}
<div class="p-6 text-white">
    <h2 class="text-xl">Delete "{{ song.title }}"?</h2>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 p-2">Yes, Delete song</button>
        <a href="{% url 'song_detail' song.pk %}" class="bg-gray-600 p-2">Cancel</a>
    </form>
</div>
{% endblock %}
