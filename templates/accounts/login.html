{% extends 'base.html' %}

{% block title %}SYNCO - Login{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex flex-col justify-center items-center">
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Welcome to SYNCO</h2>
            <p class="text-sm text-zinc-400 mt-2">Sign in to manage your worship ministry layout apps</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Username</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brandBlue focus:border-transparent transition">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brandBlue focus:border-transparent transition">
            </div>

            <button type="submit" 
                    class="w-full bg-brandBlue hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition duration-200 mt-2 shadow-lg shadow-brandBlue/10">
                Sign In
            </button>
        </form>

        <div class="text-center mt-6 border-t border-zinc-800/60 pt-4">
            <p class="text-sm text-zinc-400">
                New to the platform? 
                <a href="{% url 'register' %}" class="text-brandBlue font-medium hover:underline ml-1">Create an account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
