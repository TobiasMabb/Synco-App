{% extends 'base.html' %}

{% block content %}
<div class="min-h-[75vh] flex justify-center items-center p-4">
    <div class="w-full max-w-md glass p-8 rounded-2xl shadow-xl backdrop-blur-md text-center">
        
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/10 text-emerald-400 mb-6 border border-emerald-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-primary mb-2 tracking-wide">
            Password <span class="text-accent">Changed!</span>
        </h2>
        <p class="text-secondary text-sm mb-8 leading-relaxed max-w-xs mx-auto">
            Your password has been successfully updated. You can now log in using your new credentials.
        </p>

        <a href="{% url 'account_login' %}" class="bg-green-800 block w-full py-3 rounded-xl text-sm font-medium transition text-center">
            Sign In Now
        </a>
        
    </div>
</div>
{% endblock %}
