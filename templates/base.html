<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="logo.jpg" type="image/jpg" />
</head>
<body class="bg-zinc-950 text-white">

    <nav class="p-4 flex items-center justify-between border-b border-zinc-800">
        <button onclick="toggleSidebar()" class="text-2xl z-50">☰</button>
        <span class="font-bold text-xl">Synco</span>
    </nav>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-zinc-900 p-6 transform -translate-x-full transition-transform duration-300 z-40">
        <ul class="mt-10 space-y-4">
            <li><a href="{% url 'song_list' %}">All Songs</a></li>
            <li><a href="{% url 'song_create' %}">Add New</a></li>
        </ul>
    </div>

    <main class="p-4">{% block content %}{% endblock %}</main>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>
