{% extends 'base.html' %}

{% block title %}SYNCO - Configure Setlist{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'setlist_list' %}" class="text-zinc-400 hover:text-white text-sm font-medium">&larr; Back to Library</a>
        <h1 class="text-2xl font-black text-white tracking-tight mt-2">Initialize Service Setlist</h1>
    </div>

    <form method="POST" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 space-y-5">
        {% csrf_data %}{% csrf_token %}
        <div>
            <label class="block text-zinc-400 text-xs uppercase font-bold tracking-wider mb-2">Setlist Event Title</label>
            {{ form.title }}
        </div>
        <div>
            <label class="block text-zinc-400 text-xs uppercase font-bold tracking-wider mb-2">Target Event Date</label>
            {{ form.event_date }}
        </div>
        <div>
            <label class="block text-zinc-400 text-xs uppercase font-bold tracking-wider mb-2">Internal Service Flow Notes</label>
            {{ form.notes }}
        </div>
        <div class="pt-2">
            <button type="submit" class="w-full bg-zinc-100 hover:bg-zinc-200 text-zinc-950 font-bold p-3 rounded-xl transition text-sm">
                Save & Build Sequence Tracker
            </button>
        </div>
    </form>
</div>
{% endblock %}
